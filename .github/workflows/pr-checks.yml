# ═══════════════════════════════════════════════════════════════════════════════
# INSTRUCCIONES — Leer antes de copiar
# ═══════════════════════════════════════════════════════════════════════════════
#
# Paso 1: Copiar este archivo en tu repo como:
#   .github/workflows/pr-checks.yml
#
# Paso 2: Asegurarte de que GitHub Actions esté habilitado en el repo:
#   Settings → Actions → General → Allow all actions
#
# Eso es todo.
#
# ───────────────────────────────────────────────────────────────────────────────
# Los checks de validación (validate, security, commitlint, release-validate)
# se disparan automáticamente vía los rulesets de la org — no requieren
# ningún archivo en este repo.
#
# Este archivo maneja dos responsabilidades:
#
# 1. AUTO-TAG al mergear release o hotfix:
#   → Crea tag qa-YYYY-MM-DD   cuando se mergea release/* → qa
#   → Crea tag prod-YYYY-MM-DD cuando se mergea release/* → main
#   → Crea tag prod-YYYY-MM-DD cuando se mergea hotfix/*  → main
#
# 2. ACTUALIZACIÓN DEL DASHBOARD al hacer cualquier merge a develop/qa/main:
#   → Dispara regeneración del dashboard centralizado en tiempo real
#   → Requiere el secret ORG_READ_TOKEN configurado en la org
# ═══════════════════════════════════════════════════════════════════════════════

name: PR Checks

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - qa
      - develop

permissions:
  contents: write

jobs:
  auto-tag:
    if: |
      github.event.pull_request.merged == true &&
      (startsWith(github.head_ref, 'release/') ||
       (startsWith(github.head_ref, 'hotfix/') && github.base_ref == 'main'))
    uses: NutrappDev/.github/.github/workflows/auto-tag.yml@main
    secrets: inherit

  update-dashboard:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dashboard refresh
        run: |
          gh api repos/NutrappDev/.github/dispatches \
            -f event_type=deployment-completed \
            -f "client_payload[repo]=${{ github.repository }}" \
            -f "client_payload[branch]=${{ github.base_ref }}"
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
