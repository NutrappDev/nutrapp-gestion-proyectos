# ═══════════════════════════════════════════════════════════════════════════════
# INSTRUCCIONES — Leer antes de copiar
# ═══════════════════════════════════════════════════════════════════════════════
#
# Paso 1: Copiar este archivo en tu repo como:
#   .github/workflows/pr-checks.yml
#
# Paso 2: Asegurarte de que GitHub Actions esté habilitado en el repo:
#   Settings → Actions → General → Allow all actions
#
# Eso es todo.
#
# ───────────────────────────────────────────────────────────────────────────────
# Los checks de validación (validate, security, commitlint, release-validate)
# se disparan automáticamente vía los rulesets de la org — no requieren
# ningún archivo en este repo.
#
# Este archivo solo maneja el auto-tag al hacer merge de un release:
#   → Crea tag qa-YYYY-MM-DD   cuando se mergea release/* → qa
#   → Crea tag prod-YYYY-MM-DD cuando se mergea release/* → main
#
# ───────────────────────────────────────────────────────────────────────────────
# Para actualizar el dashboard al hacer deploy, agregar en tu workflow de deploy:
#
#   - name: Actualizar dashboard
#     if: success()
#     run: |
#       gh api repos/NutrappDev/.github/dispatches \
#         -f event_type=deployment-completed \
#         -f "client_payload[repo]=${{ github.repository }}"
#     env:
#       GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
# ═══════════════════════════════════════════════════════════════════════════════

name: Auto Tag on Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - qa

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/')
    uses: NutrappDev/.github/.github/workflows/auto-tag.yml@main
    secrets: inherit
